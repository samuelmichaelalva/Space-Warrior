<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Warrior</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <header class="hud" aria-label="Game status">
      <div>
        <span>Score</span>
        <strong id="score">0</strong>
      </div>
      <div>
        <span>My Highest</span>
        <strong id="sessionBest">0</strong>
      </div>
      <div>
        <span>Top Score</span>
        <strong id="topScore">0</strong>
      </div>
      <button class="sound-toggle" id="soundButton" type="button" aria-pressed="false" aria-label="Toggle sound">Sound On</button>
    </header>

    <section class="stage-wrap" aria-label="Space Warrior game">
      <canvas id="game" width="480" height="720"></canvas>
      <div class="overlay is-visible" id="startOverlay">
        <h1>Space Warrior</h1>
        <p>Destroy 15 UFOs to call the boss. Survive the endless neon war.</p>
        <button id="startButton" type="button">Start Game</button>
      </div>
      <div class="overlay" id="gameOverOverlay">
        <h2>Mission Over</h2>
        <p>Final Score: <strong id="finalScore">0</strong></p>
        <button id="restartButton" type="button">Restart</button>
      </div>
    </section>

    <footer class="controls">
      <span>Move: Arrow Keys / WASD / Drag</span>
      <span>Shoot: Space / Auto Fire</span>
    </footer>
  </main>

  <script src="game.js"></script>
</body>
</html>
