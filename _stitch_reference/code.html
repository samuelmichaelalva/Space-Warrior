<style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        @keyframes flicker {
            0% { opacity: 0.98; }
            5% { opacity: 0.95; }
            10% { opacity: 0.99; }
            15% { opacity: 0.93; }
            20% { opacity: 0.98; }
            100% { opacity: 1; }
        }
        @keyframes nebula-pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }
        @keyframes bullet-travel {
            from { transform: translateY(0); }
            to { transform: translateY(-100vh); }
        }
        @keyframes explode {
            0% { transform: scale(0.5); opacity: 1; filter: brightness(2); }
            100% { transform: scale(2.5); opacity: 0; filter: brightness(1); }
        }
        .scanline-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }
        .crt-flicker { animation: flicker 0.15s infinite; }
        .nebula {
            background: radial-gradient(circle at center, rgba(131, 0, 255, 0.15) 0%, transparent 70%);
            animation: nebula-pulse 10s ease-in-out infinite;
        }
        .star { position: absolute; background: white; border-radius: 50%; }
        .grid-floor {
            background-image: linear-gradient(to right, rgba(46, 91, 255, 0.1) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(46, 91, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
        }
        .bullet {
            width: 4px;
            height: 16px;
            background: #00fbfb;
            box-shadow: 0 0 10px #00fbfb, 0 0 20px #00fbfb;
            animation: bullet-travel 0.8s linear infinite;
        }
        .pixel-ship {
            clip-path: polygon(50% 0%, 0% 100%, 50% 80%, 100% 100%);
            background: linear-gradient(to bottom, #ffffff, #00fbfb);
            filter: drop-shadow(0 0 8px #00fbfb);
        }
        .explosion-fragment {
            animation: explode 0.4s ease-out forwards;
        }
    </style>

<script>
        // Generate Starfield
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.opacity = Math.random();
            if (Math.random() > 0.8) {
                star.classList.add('animate-pulse');
            }
            starfield.appendChild(star);
        }

        // Simple ship movement interaction
        document.addEventListener('mousemove', (e) => {
            const ship = document.querySelector('.pixel-ship');
            if(ship) {
                const moveX = (e.clientX - window.innerWidth/2) / 20;
                ship.parentElement.style.transform = `translateX(${moveX}px) rotateY(${moveX/2}deg)`;
            }
        });
    </script>
